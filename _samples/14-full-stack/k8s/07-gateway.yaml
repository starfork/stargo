# gateway Deployment + Service
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: stargo-demo
  labels:
    app: gateway
spec:
  type: LoadBalancer  # 对外暴露 / External exposure (生产环境 / production)
  # type: NodePort    # 本地测试用 / Local testing
  selector:
    app: gateway
  ports:
    - port: 8080
      targetPort: 8080
      name: http
    - port: 9099
      targetPort: 9099
      name: grpc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: stargo-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: gateway
          image: stargo/gateway:latest
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9099
              name: grpc
          env:
            - name: STARGO_LOG_LEVEL
              value: "info"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
# HPA: 网关自动扩缩容 / Gateway auto-scaling
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gateway-hpa
  namespace: stargo-demo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gateway
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
