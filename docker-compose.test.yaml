version: "3.8"
services:
  nats:
    image: nats:2.10-alpine
    command: ["-js"]
    ports:
      - "4222:4222"
      - "8222:8222"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  etcd:
    image: quay.io/coreos/etcd:v3.5
    command:
      - etcd
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://0.0.0.0:2379
    ports:
      - "2379:2379"

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: stargo_test
      MYSQL_DATABASE: stargo_test
    ports:
      - "3306:3306"
