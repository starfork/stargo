name: Auto Update Go Dependencies

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"

      - name: Update root module dependencies
        run: |
          go get -u ./...
          go mod tidy

      - name: Update contrib submodule dependencies
        run: |
          for dir in $(find . -name "go.mod" -not -path "./go.mod" | sed 's|/go.mod||g'); do
            echo "=== Updating $dir ==="
            (cd "$dir" && go get -u ./... && go mod tidy) || echo "Failed to update $dir, continuing..."
          done

      - name: git config
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet && git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): auto-update Go dependencies"
          branch: auto/deps-update
          delete-branch: true
          title: "chore(deps): auto-update Go dependencies"
          body: |
            Automated Go dependency update.

            - Root module: `go get -u ./... && go mod tidy`
            - All contrib submodules updated with the same commands.

            This PR was created automatically by the `auto-update-deps` workflow.
          labels: dependencies
